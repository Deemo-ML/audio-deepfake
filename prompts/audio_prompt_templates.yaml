      False

    mcq: |
      Input setting: Evidence-only direct answer.
      You do not receive audio. Use only detector evidence.

      Detector evidence:
      {evidence_text}

      Question:
      {question}

      Options:
      {options_text}

      Return only uppercase option letter(s), separated by commas with no spaces.
